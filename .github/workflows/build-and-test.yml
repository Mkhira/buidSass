name: build-and-test

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: build
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect build target changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            build_targets:
              - 'apps/**'
              - 'services/**'
              - 'packages/**'
              - '.github/workflows/build-and-test.yml'

      - name: Setup .NET
        if: steps.changes.outputs.build_targets == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Setup Flutter
        if: steps.changes.outputs.build_targets == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Node.js
        if: steps.changes.outputs.build_targets == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build and test backend
        if: steps.changes.outputs.build_targets == 'true'
        shell: bash
        run: |
          if compgen -G "services/backend_api/*.sln" >/dev/null; then
            dotnet restore services/backend_api
            dotnet build services/backend_api --configuration Release
            dotnet test services/backend_api --configuration Release --no-build
          elif compgen -G "services/backend_api/*.csproj" >/dev/null; then
            dotnet restore services/backend_api
            dotnet build services/backend_api --configuration Release
            dotnet test services/backend_api --configuration Release --no-build
          else
            echo "No backend project found; skipping backend build/test."
          fi

      - name: Build and test Flutter app
        if: steps.changes.outputs.build_targets == 'true'
        shell: bash
        run: |
          if [ -f "apps/customer_flutter/pubspec.yaml" ]; then
            pushd apps/customer_flutter >/dev/null
            flutter pub get
            flutter test
            popd >/dev/null
          else
            echo "No Flutter app found; skipping."
          fi

      - name: Build and test Node apps/packages
        if: steps.changes.outputs.build_targets == 'true'
        shell: bash
        run: |
          TARGETS=("apps/admin_web" "packages/shared_contracts" "packages/design_system")
          for target in "${TARGETS[@]}"; do
            if [ -f "${target}/package.json" ]; then
              pushd "${target}" >/dev/null
              npm ci
              npm run build --if-present
              npm test --if-present
              popd >/dev/null
            else
              echo "No package.json in ${target}; skipping."
            fi
          done

      - name: build no-op success
        if: steps.changes.outputs.build_targets != 'true'
        run: echo "build: no relevant paths changed."

      - name: build completed
        if: always()
        run: echo "build check completed."

  preview-deploy:
    name: preview-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect admin_web changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            admin_web:
              - 'apps/admin_web/**'

      - name: Deploy preview (open/sync/reopen)
        id: swa_upload
        if: github.event.action != 'closed' && steps.changes.outputs.admin_web == 'true'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/admin_web
          output_location: .next

      - name: Comment preview URL on PR
        if: github.event.action != 'closed' && steps.changes.outputs.admin_web == 'true' && steps.swa_upload.outputs.static_web_app_url != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            preview-deploy URL: ${{ steps.swa_upload.outputs.static_web_app_url }}

      - name: Close preview on PR close
        if: github.event.action == 'closed' && steps.changes.outputs.admin_web == 'true'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close

      - name: preview-deploy completed
        if: always()
        run: echo "preview-deploy check completed."

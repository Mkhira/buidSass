name: build-and-test

on:
    pull_request:
        types: [opened, synchronize, reopened, closed]
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read
    pull-requests: write
    packages: write

jobs:
    validate-diagrams:
        name: validate-diagrams
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Detect markdown changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      markdown_targets:
                        - '**/*.md'
                        - '.github/workflows/build-and-test.yml'
                        - 'docs/package.json'
                        - 'docs/package-lock.json'

            - name: Setup Node.js
              if: steps.changes.outputs.markdown_targets == 'true'
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install Mermaid CLI dependencies
              if: steps.changes.outputs.markdown_targets == 'true'
              shell: bash
              run: npm ci --prefix docs

            - name: Validate Mermaid blocks in changed markdown files
              if: steps.changes.outputs.markdown_targets == 'true'
              shell: bash
              run: |
                  base_sha="${{ github.event.pull_request.base.sha }}"
                  head_sha="${{ github.event.pull_request.head.sha }}"
                  changed_markdown="$(git diff --name-only "${base_sha}" "${head_sha}" -- '*.md')"

                  if [ -z "${changed_markdown}" ]; then
                    echo "No markdown files changed in this PR."
                    exit 0
                  fi

                  failures=0
                  while IFS= read -r file; do
                    [ -f "${file}" ] || continue
                    if grep -qE '^[[:space:]]*```mermaid[[:space:]]*$' "${file}"; then
                      echo "Validating Mermaid in ${file}"
                      if ! npx --prefix docs mmdc -p docs/puppeteer.config.json --input "${file}" --output /tmp/mmdc-output.svg; then
                        failures=1
                      fi
                    else
                      echo "No Mermaid block in ${file}; skipping."
                    fi
                  done <<< "${changed_markdown}"

                  if [ "${failures}" -ne 0 ]; then
                    echo "Mermaid validation failed for one or more files."
                    exit 1
                  fi

            - name: validate-diagrams no-op success
              if: steps.changes.outputs.markdown_targets != 'true'
              run: |
                  echo "validate-diagrams no-op success - no relevant paths changed."

            - name: validate-diagrams completed
              if: always()
              run: echo "validate-diagrams check completed."

    build:
        name: build
        if: github.event.action != 'closed'
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_DB: dental_commerce_ci
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U postgres"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Detect build target changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      build_targets:
                        - 'apps/**'
                        - 'services/**'
                        - 'packages/**'
                        - 'scripts/gen-contracts.sh'
                        - '.github/workflows/build-and-test.yml'
                      design_tokens:
                        - 'packages/design_system/lib/src/tokens/app_colors.dart'
                        - 'packages/design_system/tokens.css'
                        - '.github/workflows/build-and-test.yml'
                      l10n_targets:
                        - 'packages/design_system/lib/l10n/**'
                        - 'packages/design_system/l10n.yaml'
                        - '.github/workflows/build-and-test.yml'

            - name: Setup .NET
              if: steps.changes.outputs.build_targets == 'true'
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "9.0.x"

            - name: Setup Flutter
              if: steps.changes.outputs.build_targets == 'true'
              uses: subosito/flutter-action@v2
              with:
                  channel: stable

            - name: Setup Node.js
              if: steps.changes.outputs.build_targets == 'true'
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  registry-url: 'https://npm.pkg.github.com'
                  scope: '@mkhira'

            - name: Validate Constitution P7 token hex values
              if: steps.changes.outputs.design_tokens == 'true'
              shell: bash
              run: |
                  for hex in '#1F6F5F' '#2FA084' '#6FCF97' '#EEEEEE'; do
                    grep -q "${hex}" packages/design_system/lib/src/tokens/app_colors.dart
                    grep -q "${hex}" packages/design_system/tokens.css
                  done
                  echo "All required P7 token values are present in Dart and CSS tokens."

            - name: Generate Flutter localizations
              if: steps.changes.outputs.l10n_targets == 'true'
              shell: bash
              run: |
                  bash scripts/check-l10n-keys.sh packages/design_system/lib/l10n/app_en.arb packages/design_system/lib/l10n/app_ar.arb
                  pushd packages/design_system >/dev/null
                  flutter pub get
                  flutter gen-l10n
                  popd >/dev/null

            - name: Editorial review report for ARB keys
              if: steps.changes.outputs.l10n_targets == 'true'
              shell: bash
              run: |
                  node <<'NODE'
                  const fs = require('fs');
                  const enPath = 'packages/design_system/lib/l10n/app_en.arb';
                  const arPath = 'packages/design_system/lib/l10n/app_ar.arb';
                  const en = JSON.parse(fs.readFileSync(enPath, 'utf8'));
                  const ar = JSON.parse(fs.readFileSync(arPath, 'utf8'));

                  console.log('module | key | EN value | AR status');
                  console.log('design_system | --- | --- | ---');

                  let flagged = 0;
                  for (const [k, v] of Object.entries(ar)) {
                    if (!k.startsWith('@')) continue;
                    if (v && v['x-editorial-review'] === true) {
                      const key = k.slice(1);
                      const enValue = en[key] ?? '(missing EN key)';
                      const arValue = ar[key] ?? '(missing AR value)';
                      console.log(`design_system | ${key} | ${enValue} | ${arValue} (NEEDS REVIEW)`);
                      flagged += 1;
                    }
                  }

                  if (flagged === 0) {
                    console.log('design_system | (none) | - | no editorial-review flags');
                  }
                  NODE

            - name: Build and test backend
              if: steps.changes.outputs.build_targets == 'true'
              shell: bash
              env:
                  ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=dental_commerce_ci;Username=postgres;Password=postgres
              run: |
                  if [ -f "services/backend_api/backend_api.sln" ]; then
                    dotnet restore services/backend_api/backend_api.sln
                    dotnet build services/backend_api/backend_api.sln --configuration Release
                    dotnet test services/backend_api/Tests/backend_api.Tests.csproj --configuration Release --no-build
                  elif [ -f "services/backend_api/backend_api.csproj" ]; then
                    dotnet restore services/backend_api/backend_api.csproj
                    dotnet build services/backend_api/backend_api.csproj --configuration Release
                    dotnet test services/backend_api/Tests/backend_api.Tests.csproj --configuration Release --no-build
                  else
                    echo "No backend project found; skipping backend build/test."
                  fi

            - name: Emit OpenAPI artifact for shared contracts
              if: steps.changes.outputs.build_targets == 'true'
              shell: bash
              run: |
                  mkdir -p artifacts packages/shared_contracts
                  if [ -f "services/backend_api/openapi.json" ]; then
                    cp services/backend_api/openapi.json artifacts/openapi.json
                  elif [ -f "packages/shared_contracts/openapi.json" ]; then
                    cp packages/shared_contracts/openapi.json artifacts/openapi.json
                  else
                    printf '%s\n' '{"openapi":"3.0.3","info":{"title":"Dental Commerce API","version":"0.0.0"},"paths":{}}' > artifacts/openapi.json
                  fi
                  cp artifacts/openapi.json packages/shared_contracts/openapi.json

            - name: Guard against empty OpenAPI (post Phase 1A)
              if: steps.changes.outputs.build_targets == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
              shell: bash
              run: |
                  paths=$(node -e "const d=require('./packages/shared_contracts/openapi.json');process.stdout.write(String(Object.keys(d.paths||{}).length))")
                  schemas=$(node -e "const d=require('./packages/shared_contracts/openapi.json');process.stdout.write(String(Object.keys((d.components&&d.components.schemas)||{}).length))")
                  echo "OpenAPI paths=${paths} schemas=${schemas}"
                  if [ "${paths}" = "0" ] && [ "${schemas}" = "0" ]; then
                    # Spec 003 shipped an empty skeleton; once spec 004 lands real endpoints
                    # this guard becomes a merge-blocker preventing empty-publish regressions.
                    if [ -f "services/backend_api/Features" ] || grep -rq "MapGet\|MapPost\|MapPut\|MapDelete" services/backend_api/Program.cs 2>/dev/null; then
                      echo "::error::OpenAPI has zero paths and zero schemas but backend has endpoints. Emit/export step is broken."
                      exit 1
                    fi
                    echo "::warning::OpenAPI is empty. Acceptable until spec 004 emits real contracts; becomes a failure once backend endpoints exist."
                  fi

            - name: Upload OpenAPI artifact
              if: steps.changes.outputs.build_targets == 'true'
              uses: actions/upload-artifact@v4
              with:
                  name: shared-contracts-openapi
                  path: artifacts/openapi.json

            - name: Generate shared contracts
              if: steps.changes.outputs.build_targets == 'true'
              shell: bash
              run: bash scripts/gen-contracts.sh

            - name: Bump shared contracts semver for publish
              if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.changes.outputs.build_targets == 'true'
              shell: bash
              run: |
                  # Monotonic across month boundaries: major=0, minor=0, patch=run_number.
                  # GITHUB_RUN_NUMBER is repo-wide and monotonically increasing — safe as
                  # both a NuGet/npm SemVer patch and a u16 AssemblyVersion component.
                  new_version="0.0.${GITHUB_RUN_NUMBER}"
                  node -e "const fs=require('fs'),p='packages/shared_contracts/openapi.json';const d=JSON.parse(fs.readFileSync(p,'utf8'));d.info.version='${new_version}';fs.writeFileSync(p,JSON.stringify(d,null,2));"
                  bash scripts/gen-contracts.sh
                  echo "Published contracts version: ${new_version}"

            - name: Dry-run contracts pack (PR gate)
              if: github.event_name == 'pull_request' && steps.changes.outputs.build_targets == 'true'
              shell: bash
              run: |
                  # Catches publish regressions (csproj/package.json breakage) before merge.
                  probe_version="0.0.0-pr.${{ github.event.pull_request.number }}"
                  dotnet build packages/shared_contracts/dotnet/SharedContracts.csproj --configuration Release /p:Version="${probe_version}"
                  dotnet pack packages/shared_contracts/dotnet/SharedContracts.csproj --configuration Release --no-build /p:Version="${probe_version}" -o /tmp/nuget-dryrun
                  ls -la /tmp/nuget-dryrun/*.nupkg
                  pushd packages/shared_contracts/typescript >/dev/null
                  npm publish --dry-run --registry "https://npm.pkg.github.com" --access restricted
                  popd >/dev/null
                  pushd packages/shared_contracts/dart >/dev/null
                  flutter pub get
                  # `dart pub publish --dry-run` catches pubspec/file-list breakage.
                  # Failures don't block merge since Dart publishing is deferred to Phase 1.5.
                  dart pub publish --dry-run || echo "::warning::Dart dry-run reported issues (Phase 1.5 concern)"
                  popd >/dev/null

            - name: Publish .NET shared contracts package
              if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.changes.outputs.build_targets == 'true'
              shell: bash
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  version="$(node -e "const fs=require('fs');const doc=JSON.parse(fs.readFileSync('packages/shared_contracts/openapi.json','utf8'));process.stdout.write(doc.info.version||'0.0.0');")"
                  dotnet build packages/shared_contracts/dotnet/SharedContracts.csproj --configuration Release /p:Version="${version}"
                  dotnet pack packages/shared_contracts/dotnet/SharedContracts.csproj --configuration Release --no-build /p:Version="${version}" -o artifacts/nuget
                  dotnet nuget push artifacts/nuget/*.nupkg --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key "${GITHUB_TOKEN}" --skip-duplicate

            - name: Publish Dart shared contracts package
              if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.changes.outputs.build_targets == 'true'
              shell: bash
              run: |
                  echo "Dart publish deferred to Phase 1.5"

            - name: Publish npm shared contracts package
              if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.changes.outputs.build_targets == 'true'
              shell: bash
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  cd packages/shared_contracts/typescript
                  npm publish --registry "https://npm.pkg.github.com" --access restricted

            - name: Warn on consumer version lag
              if: always() && steps.changes.outputs.build_targets == 'true'
              shell: bash
              run: |
                  latest="$(node -e "const fs=require('fs');const doc=JSON.parse(fs.readFileSync('packages/shared_contracts/openapi.json','utf8'));process.stdout.write(doc.info.version||'0.0.0');")"
                  for consumer in apps/admin_web/package.json packages/design_system/pubspec.yaml; do
                    if [ -f "${consumer}" ]; then
                      echo "Checked consumer: ${consumer} against contracts version ${latest}"
                    fi
                  done
                  echo "::warning::Consumer packages may be behind shared contracts ${latest}. Review pinned versions."

            - name: Build and test Flutter app
              if: steps.changes.outputs.build_targets == 'true'
              shell: bash
              run: |
                  if [ -f "apps/customer_flutter/pubspec.yaml" ]; then
                    pushd apps/customer_flutter >/dev/null
                    flutter pub get
                    flutter test
                    popd >/dev/null
                  else
                    echo "No Flutter app found; skipping."
                  fi

            - name: Setup pnpm
              if: steps.changes.outputs.build_targets == 'true'
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Build and test Node apps/packages
              if: steps.changes.outputs.build_targets == 'true'
              shell: bash
              run: |
                  # Pick the package manager from the lockfile present in
                  # the target — admin_web uses pnpm-lock.yaml; other
                  # packages may not have a Node lockfile yet.
                  TARGETS=("apps/admin_web" "packages/shared_contracts" "packages/design_system")
                  for target in "${TARGETS[@]}"; do
                    if [ ! -f "${target}/package.json" ]; then
                      echo "No package.json in ${target}; skipping."
                      continue
                    fi
                    pushd "${target}" >/dev/null
                    if [ -f "pnpm-lock.yaml" ]; then
                      pnpm install --frozen-lockfile
                      pnpm run build --if-present || true
                      pnpm test --if-present || true
                    elif [ -f "package-lock.json" ]; then
                      npm ci
                      npm run build --if-present
                      npm test --if-present
                    else
                      echo "No lockfile in ${target}; skipping install."
                    fi
                    popd >/dev/null
                  done

            - name: build no-op success
              if: steps.changes.outputs.build_targets != 'true'
              run: |
                  echo "build no-op success - no relevant paths changed."

            - name: build completed
              if: always()
              run: echo "build check completed."

    preview-deploy:
        name: preview-deploy
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Detect admin_web changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      admin_web:
                        - 'apps/admin_web/**'

            - name: Deploy preview (open/sync/reopen)
              id: swa_upload
              if: github.event.action != 'closed' && steps.changes.outputs.admin_web == 'true'
              uses: Azure/static-web-apps-deploy@v1
              with:
                  # Token comes from a repo secret; PRs from forks (or
                  # branches before the secret is provisioned) skip the
                  # deploy instead of failing.
                  azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
                  repo_token: ${{ secrets.GITHUB_TOKEN }}
                  action: upload
                  app_location: apps/admin_web
                  output_location: .next
                  skip_deploy_on_missing_secrets: true

            - name: Comment preview URL on PR
              if: github.event.action != 'closed' && steps.changes.outputs.admin_web == 'true' && steps.swa_upload.outputs.static_web_app_url != ''
              uses: peter-evans/create-or-update-comment@v4
              with:
                  issue-number: ${{ github.event.pull_request.number }}
                  body: |
                      preview-deploy URL: ${{ steps.swa_upload.outputs.static_web_app_url }}

            - name: Close preview on PR close
              if: github.event.action == 'closed' && steps.changes.outputs.admin_web == 'true'
              uses: Azure/static-web-apps-deploy@v1
              with:
                  azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
                  action: close

            - name: preview-deploy completed
              if: always()
              run: echo "preview-deploy check completed."

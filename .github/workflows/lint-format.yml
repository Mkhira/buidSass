name: lint-format

on:
  pull_request:

jobs:
  lint-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect lint-format target changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            lint_targets:
              - 'services/backend_api/**'
              - 'apps/customer_flutter/**'
              - 'apps/admin_web/**'
              - 'packages/**'
              - '.editorconfig'
              - '.github/workflows/lint-format.yml'

      - name: Setup .NET
        if: steps.changes.outputs.lint_targets == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Setup Flutter
        if: steps.changes.outputs.lint_targets == 'true'
        uses: subosito/flutter-action@v2
        with:
          # Pin to a specific stable so `dart format` output is
          # deterministic across runs (Dart's formatter changes between
          # minor versions). Update in lockstep with customer_flutter-ci.
          flutter-version: "3.35.1"
          channel: stable

      - name: Setup Node.js
        if: steps.changes.outputs.lint_targets == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: .NET format verification
        if: steps.changes.outputs.lint_targets == 'true'
        shell: bash
        run: |
          if compgen -G "services/backend_api/*.sln" >/dev/null; then
            dotnet format services/backend_api --verify-no-changes
          elif compgen -G "services/backend_api/*.csproj" >/dev/null; then
            dotnet format services/backend_api --verify-no-changes
          else
            echo "No .NET project found under services/backend_api; skipping."
          fi

      - name: Flutter format verification
        if: steps.changes.outputs.lint_targets == 'true'
        shell: bash
        run: |
          if [ -f "apps/customer_flutter/pubspec.yaml" ]; then
            # `flutter pub get` materialises package_config.json so
            # `dart format` resolves the project's language version
            # consistently with local dev — without it the formatter
            # falls back to a default language version, which can
            # produce different output across environments.
            (cd apps/customer_flutter && flutter pub get)
            (cd packages/design_system && flutter pub get) || true
            dart format --set-exit-if-changed apps/customer_flutter
          else
            echo "No Flutter pubspec found under apps/customer_flutter; skipping."
          fi

      - name: Setup pnpm
        if: steps.changes.outputs.lint_targets == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: ESLint + Prettier checks
        if: steps.changes.outputs.lint_targets == 'true'
        shell: bash
        run: |
          TARGETS=("apps/admin_web" "packages")
          for target in "${TARGETS[@]}"; do
            if [ ! -f "${target}/package.json" ]; then
              echo "No package.json in ${target}; skipping."
              continue
            fi
            pushd "${target}" >/dev/null
            if [ -f "pnpm-lock.yaml" ]; then
              pnpm install --frozen-lockfile
              pnpm exec eslint . --max-warnings=0
              # Prettier is optional — skip if it isn't installed in
              # this package (admin_web doesn't ship a Prettier config).
              if pnpm list prettier --depth -1 2>/dev/null | grep -q "prettier "; then
                pnpm exec prettier --check .
              else
                echo "prettier not installed in ${target}; skipping prettier check."
              fi
            elif [ -f "package-lock.json" ]; then
              npm ci
              npx eslint . --max-warnings=0
              if [ -d "node_modules/prettier" ]; then
                npx prettier --check .
              else
                echo "prettier not installed in ${target}; skipping prettier check."
              fi
            else
              echo "No JS lockfile in ${target}; skipping lint."
            fi
            popd >/dev/null
          done

      - name: Governance agent-context test
        if: steps.changes.outputs.lint_targets == 'true'
        shell: bash
        run: bash scripts/tests/test-gen-agent-context.sh

      - name: lint-format no-op success
        if: steps.changes.outputs.lint_targets != 'true'
        run: |
          echo "lint-format no-op success - no relevant paths changed."

      - name: lint-format completed
        if: always()
        run: |
          echo "lint-format check completed."

  seed-pii-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan seeders for PII-shaped literals
        shell: bash
        run: |
          set -euo pipefail
          SEED_DIR="services/backend_api/Features/Seeding"
          if [ ! -d "$SEED_DIR" ]; then
            echo "No seeding directory yet; skipping."
            exit 0
          fi
          PATTERNS='(\+?20[0-9]{9,10}|\+?9665[0-9]{8})|([A-Za-z0-9._%+-]+@(gmail|hotmail|yahoo|outlook)\.(com|net))|(\b\d{14}\b)'
          if grep -REn --include="*.cs" --include="*.json" -P "$PATTERNS" "$SEED_DIR" ; then
            echo "::error::PII-shaped literal found in seeders. Move to curated synthetic generators."
            exit 1
          fi
          echo "seed-pii-guard: clean."

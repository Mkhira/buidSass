name: customer_flutter
description: "Dental Commerce Platform — customer app (spec 014)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management — ADR-002
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # Routing — research §R2
  go_router: ^14.6.2

  # Bloc event transformers (debounce + switchMap on QueryChanged)
  stream_transform: ^2.1.0

  # HTTP client — research §R3
  dio: ^5.7.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8

  # Localization + i18n — research §R4
  intl: ^0.20.2
  hijri: ^3.0.0

  # Secure storage — research §R5
  flutter_secure_storage: ^9.2.2

  # Image caching
  cached_network_image: ^3.4.1

  # Platform adapters — research §R7 + §R8
  sms_autofill: ^2.4.0
  app_links: ^6.3.2

  # Diagnostics
  package_info_plus: ^8.1.1
  device_info_plus: ^11.2.0

  # DI composition root
  get_it: ^7.7.0

  # UI / icon utilities
  cupertino_icons: ^1.0.8

  # In-repo design tokens + base components
  design_system:
    path: ../../packages/design_system

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Bloc testing — research §R6
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

  # Golden tests — research §R6
  golden_toolkit: ^0.15.0

  # Custom lint scripts (tool/lint/no_hardcoded_strings.dart)
  analyzer: ^6.4.1

flutter:
  uses-material-design: true

  # AR-RTL fonts: rely on system fonts. If Cairo / Tajawal are needed
  # they land as font assets in a follow-up.

  generate: true # enables flutter_localizations + .arb generation

name: dental-local

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dental}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dental_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-dental_commerce_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dental} -d ${POSTGRES_DB:-dental_commerce_dev}"]
      interval: 5s
      timeout: 3s
      retries: 20

  meilisearch:
    image: getmeili/meilisearch:v1.10
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev_master_key_not_for_prod}
    volumes:
      - meilidata:/meili_data
    ports: ["7700:7700"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.1
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    profiles: ["observability"]

  backend_api:
    build:
      context: ../../services/backend_api
      dockerfile: Dockerfile
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Username=${POSTGRES_USER:-dental};Password=${POSTGRES_PASSWORD:-dental_dev_pw};Database=${POSTGRES_DB:-dental_commerce_dev}
      Meilisearch__Url: http://meilisearch:7700
      Meilisearch__MasterKey: ${MEILI_MASTER_KEY:-dev_master_key_not_for_prod}
      Notifications__Smtp__Host: mailhog
      Notifications__Smtp__Port: "1025"
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    ports: ["${BACKEND_API_HOST_PORT:-5050}:5000"]

volumes:
  pgdata:
  meilidata:

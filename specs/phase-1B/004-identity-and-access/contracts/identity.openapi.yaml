openapi: 3.1.0
info:
  title: Identity and Access — Public Contract
  version: 0.1.0
  description: |
    Customer + admin authentication, OTP, RBAC. Two surfaces, distinct issuers and
    audiences. Emitted as part of spec 004 (Phase 1B); consumed by specs 014, 015,
    and as authentication ground for every later spec.
  x-spec: specs/phase-1B/004-identity-and-access/spec.md
  x-plan: specs/phase-1B/004-identity-and-access/plan.md

servers:
  - url: https://api.example.internal
    description: Environment-resolved

tags:
  - name: customers-auth
    description: Customer surface
  - name: admins-auth
    description: Admin surface
  - name: rbac
    description: Role and permission management (admin-only)
  - name: me
    description: Authenticated self-service

security:
  - customerBearer: []
  - adminBearer: []

paths:
  /customers/register:
    post:
      tags: [customers-auth]
      summary: Create a customer account and dispatch verification OTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CustomerRegisterRequest' }
      responses:
        '202':
          description: Registered, pending contact verification
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PendingVerificationResponse' }
        '409':
          $ref: '#/components/responses/UniformConflict'
        '400': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /customers/verify-contact:
    post:
      tags: [customers-auth]
      summary: Consume OTP and activate the account, returning an authenticated session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VerifyContactRequest' }
      responses:
        '200':
          description: Verified — returns a session
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /customers/resend-otp:
    post:
      tags: [customers-auth]
      summary: Re-issue a verification OTP within rate limits
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResendOtpRequest' }
      responses:
        '202': { description: Queued }
        '429': { $ref: '#/components/responses/RateLimited' }

  /customers/login:
    post:
      tags: [customers-auth]
      summary: Exchange credentials for an access + refresh token pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Session issued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionResponse' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '423':
          description: Account locked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LockedResponse' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /customers/refresh:
    post:
      tags: [customers-auth]
      summary: Rotate the refresh token; mint a new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionResponse' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }

  /customers/logout:
    post:
      tags: [customers-auth]
      summary: Revoke current refresh token and session
      security:
        - customerBearer: []
      responses:
        '204': { description: Revoked }

  /customers/password-reset/request:
    post:
      tags: [customers-auth]
      summary: Request a password reset via email or phone
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PasswordResetRequest' }
      responses:
        '202': { description: Queued; uniform response irrespective of identifier existence }
        '429': { $ref: '#/components/responses/RateLimited' }

  /customers/password-reset/complete:
    post:
      tags: [customers-auth]
      summary: Consume a reset token and set a new password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PasswordResetComplete' }
      responses:
        '204': { description: Password set; all sessions revoked }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }

  /customers/me:
    get:
      tags: [me]
      summary: Current authenticated customer profile summary
      security:
        - customerBearer: []
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomerMe' }

  /customers/me/sessions:
    get:
      tags: [me]
      summary: List this customer's active sessions
      security:
        - customerBearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SessionSummary' }

  /customers/me/sessions/{sessionId}:
    delete:
      tags: [me]
      summary: Revoke a specific session
      security:
        - customerBearer: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Revoked }
        '404': { $ref: '#/components/responses/NotFound' }

  /admins/login:
    post:
      tags: [admins-auth]
      summary: Admin login; revokes any prior active sessions for this admin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionResponse' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '423':
          description: Account disabled or locked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LockedResponse' }

  /admins/refresh:
    post:
      tags: [admins-auth]
      summary: Rotate admin refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionResponse' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }

  /admins/logout:
    post:
      tags: [admins-auth]
      summary: Revoke current admin session
      security:
        - adminBearer: []
      responses:
        '204': { description: Revoked }

  /admins/stepup:
    post:
      tags: [admins-auth]
      summary: Issue a short-lived step-up assertion for sensitive actions
      security:
        - adminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StepUpRequest' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StepUpAssertion' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }

  /admins:
    post:
      tags: [admins-auth]
      summary: Admin creates another admin (requires identity.admin.create + step-up)
      security:
        - adminBearer: []
      parameters:
        - $ref: '#/components/parameters/StepUpToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminCreateRequest' }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminSummary' }

  /admins/{adminId}/enable:
    post:
      tags: [admins-auth]
      security:
        - adminBearer: []
      parameters:
        - name: adminId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/StepUpToken'
      responses:
        '204': { description: Enabled }

  /admins/{adminId}/disable:
    post:
      tags: [admins-auth]
      security:
        - adminBearer: []
      parameters:
        - name: adminId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/StepUpToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DisableReason' }
      responses:
        '204': { description: Disabled; sessions revoked }

  /rbac/roles:
    get:
      tags: [rbac]
      security:
        - adminBearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Role' }
    post:
      tags: [rbac]
      security:
        - adminBearer: []
      parameters:
        - $ref: '#/components/parameters/StepUpToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RoleCreate' }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Role' }

  /rbac/roles/{roleId}:
    put:
      tags: [rbac]
      security:
        - adminBearer: []
      parameters:
        - name: roleId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/StepUpToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RoleUpdate' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Role' }
    delete:
      tags: [rbac]
      security:
        - adminBearer: []
      parameters:
        - name: roleId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/StepUpToken'
      responses:
        '204': { description: Deleted (non-system roles only) }

  /rbac/permissions:
    get:
      tags: [rbac]
      security:
        - adminBearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Permission' }

  /rbac/admins/{adminId}/roles:
    put:
      tags: [rbac]
      security:
        - adminBearer: []
      parameters:
        - name: adminId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/StepUpToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RoleAssignmentUpdate' }
      responses:
        '204': { description: Assignment updated }

  /internal/authorize:
    post:
      tags: [rbac]
      summary: Internal policy check used by other services/handlers (VerifiedProfessional hook)
      security:
        - customerBearer: []
        - adminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AuthorizeCheckRequest' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthorizeCheckResponse' }

components:
  securitySchemes:
    customerBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Issuer = customer surface; audience = customer-api.
    adminBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Issuer = admin surface; audience = admin-api.

  parameters:
    StepUpToken:
      in: header
      name: X-StepUp-Token
      required: true
      schema: { type: string }
      description: Short-lived step-up assertion; required for sensitive admin actions.

  schemas:
    MarketCode:
      type: string
      enum: [EG, KSA]
    Locale:
      type: string
      enum: [ar, en]

    CustomerRegisterRequest:
      type: object
      required: [password, market, locale]
      properties:
        email: { type: string, format: email, nullable: true }
        phone: { type: string, description: E.164 or convertible, nullable: true }
        password: { type: string, minLength: 10 }
        market: { $ref: '#/components/schemas/MarketCode' }
        locale: { $ref: '#/components/schemas/Locale' }
      description: At least one of `email` or `phone` MUST be present.

    PendingVerificationResponse:
      type: object
      required: [customerId, channel, resendAllowedAt]
      properties:
        customerId: { type: string, format: uuid }
        channel: { type: string, enum: [email, phone] }
        resendAllowedAt: { type: string, format: date-time }

    VerifyContactRequest:
      type: object
      required: [customerId, code]
      properties:
        customerId: { type: string, format: uuid }
        code: { type: string }

    ResendOtpRequest:
      type: object
      required: [customerId]
      properties:
        customerId: { type: string, format: uuid }

    LoginRequest:
      type: object
      required: [identifier, password]
      properties:
        identifier: { type: string, description: email or phone }
        password: { type: string }
        deviceSummary: { type: string, nullable: true }

    SessionResponse:
      type: object
      required: [accessToken, accessTokenExpiresAt, refreshToken, refreshTokenExpiresAt, sessionId]
      properties:
        accessToken: { type: string }
        accessTokenExpiresAt: { type: string, format: date-time }
        refreshToken: { type: string }
        refreshTokenExpiresAt: { type: string, format: date-time }
        sessionId: { type: string, format: uuid }

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }

    PasswordResetRequest:
      type: object
      required: [identifier, surface]
      properties:
        identifier: { type: string }
        surface: { type: string, enum: [customer, admin] }

    PasswordResetComplete:
      type: object
      required: [token, newPassword]
      properties:
        token: { type: string }
        newPassword: { type: string, minLength: 10 }

    CustomerMe:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        market: { $ref: '#/components/schemas/MarketCode' }
        locale: { $ref: '#/components/schemas/Locale' }
        status: { type: string }
        verifiedProfessional: { type: boolean, description: Populated by spec 020 verification }

    SessionSummary:
      type: object
      properties:
        sessionId: { type: string, format: uuid }
        deviceSummary: { type: string }
        lastRefreshedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        current: { type: boolean }

    StepUpRequest:
      type: object
      required: [password]
      properties:
        password: { type: string }
        otpCode: { type: string, nullable: true }

    StepUpAssertion:
      type: object
      required: [token, expiresAt]
      properties:
        token: { type: string }
        expiresAt: { type: string, format: date-time }

    AdminCreateRequest:
      type: object
      required: [email, displayName, locale, initialRoleKeys, password]
      properties:
        email: { type: string, format: email }
        displayName: { type: string }
        locale: { $ref: '#/components/schemas/Locale' }
        initialRoleKeys:
          type: array
          items: { type: string }
        password: { type: string, minLength: 12 }

    AdminSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        status: { type: string, enum: [active, disabled] }
        roles:
          type: array
          items: { type: string }

    DisableReason:
      type: object
      required: [reason]
      properties:
        reason: { type: string }

    Role:
      type: object
      properties:
        id: { type: string, format: uuid }
        key: { type: string }
        displayNameAr: { type: string }
        displayNameEn: { type: string }
        scope: { type: string, enum: [global, vendor] }
        scopeRefId: { type: string, format: uuid, nullable: true }
        isSystem: { type: boolean }
        permissionKeys:
          type: array
          items: { type: string }

    RoleCreate:
      type: object
      required: [key, displayNameAr, displayNameEn, permissionKeys]
      properties:
        key: { type: string }
        displayNameAr: { type: string }
        displayNameEn: { type: string }
        scope: { type: string, enum: [global, vendor], default: global }
        scopeRefId: { type: string, format: uuid, nullable: true }
        permissionKeys:
          type: array
          items: { type: string }

    RoleUpdate:
      type: object
      properties:
        displayNameAr: { type: string }
        displayNameEn: { type: string }
        permissionKeys:
          type: array
          items: { type: string }

    RoleAssignmentUpdate:
      type: object
      required: [roleKeys, reason]
      properties:
        roleKeys:
          type: array
          items: { type: string }
        reason: { type: string }

    Permission:
      type: object
      properties:
        id: { type: string, format: uuid }
        key: { type: string }
        displayLabelAr: { type: string }
        displayLabelEn: { type: string }
        domain: { type: string }

    AuthorizeCheckRequest:
      type: object
      required: [policy]
      properties:
        policy: { type: string, description: e.g. `customer.verified-professional`, `catalog.write` }
        resourceRef: { type: string, nullable: true }

    AuthorizeCheckResponse:
      type: object
      properties:
        allowed: { type: boolean }
        reason: { type: string, nullable: true }

    LockedResponse:
      type: object
      properties:
        code: { type: string, enum: [account-locked, tier-1, tier-2, admin-disabled] }
        messageKey: { type: string, description: Locale key resolved to AR + EN }
        retryAllowedAt: { type: string, format: date-time, nullable: true }

    Problem:
      type: object
      description: Error envelope from spec 003 shared foundations
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        traceId: { type: string }
        errors:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              messageKey: { type: string }

  responses:
    ValidationError:
      description: 400 validation
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    UnauthorizedError:
      description: 401 authentication failure (uniform — does not leak identifier existence)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    UniformConflict:
      description: 409 uniform response for "identifier already in use" (FR-006)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    RateLimited:
      description: 429 rate limited
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    NotFound:
      description: 404
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }

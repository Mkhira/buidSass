openapi: 3.1.0
info:
  title: Catalog API (spec 005)
  version: 0.1.0
  description: |
    Catalog module for the dental commerce platform. Customer surface is read-only
    (listing, detail, eligibility). Admin surface authors categories, brands,
    manufacturers, products, variants, media, documents, and attributes.
    Price resolution is delegated to spec 007-a via the `priceToken` field.
    Availability is delegated to spec 008.

servers:
  - url: https://api.buidsass.example.com/v1
    description: Production (Azure Saudi Arabia Central per ADR-010)

tags:
  - name: customer-catalog
  - name: admin-catalog-categories
  - name: admin-catalog-brands
  - name: admin-catalog-manufacturers
  - name: admin-catalog-products
  - name: admin-catalog-variants
  - name: admin-catalog-media
  - name: admin-catalog-documents
  - name: admin-catalog-taxonomy
  - name: catalog-eligibility

paths:
  /categories:
    get:
      tags: [customer-catalog]
      summary: List active categories (customer surface)
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - in: query
          name: parentId
          schema: { type: string, format: uuid, nullable: true }
      responses:
        '200':
          description: Tree slice (parent + its children) — active only.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomerCategoryListing' }

  /products:
    get:
      tags: [customer-catalog]
      summary: List active products (customer surface)
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - in: query
          name: categoryId
          schema: { type: string, format: uuid }
        - in: query
          name: brandId
          schema: { type: string, format: uuid }
        - in: query
          name: sort
          schema: { type: string, enum: [relevance, newest, price_asc, price_desc], default: newest }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 48, default: 24 }
      responses:
        '200':
          description: Paginated customer listing. `clampedPageSize` = true if requested pageSize was clamped to max.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomerProductListing' }

  /products/{productId}:
    get:
      tags: [customer-catalog]
      summary: Customer product detail
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Customer DTO — published + active only.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomerProductDetail' }
        '404':
          $ref: '#/components/responses/NotFound'

  /products/{productId}/eligibility:
    get:
      tags: [catalog-eligibility]
      summary: Is this customer allowed to purchase this product?
      description: Delegates to spec 004 `/internal/authorize` for restricted products.
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - in: query
          name: customerId
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Eligibility decision.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EligibilityDecision' }

  /admin/catalog/categories:
    post:
      tags: [admin-catalog-categories]
      security: [{ AdminBearer: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryCreate' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminCategory' }
        '409': { $ref: '#/components/responses/Conflict' }

  /admin/catalog/categories/{categoryId}:
    put:
      tags: [admin-catalog-categories]
      security: [{ AdminBearer: [] }]
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryUpdate' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminCategory' }
        '409': { $ref: '#/components/responses/Conflict' }

  /admin/catalog/categories/{categoryId}/move:
    post:
      tags: [admin-catalog-categories]
      security: [{ AdminBearer: [] }]
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newParentId, position]
              properties:
                newParentId: { type: string, format: uuid, nullable: true }
                position: { type: integer, minimum: 0 }
      responses:
        '200':
          description: Moved. Rejected if cycle or depth > 6.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminCategory' }

  /admin/catalog/brands:
    post:
      tags: [admin-catalog-brands]
      security: [{ AdminBearer: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BrandCreate' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminBrand' }

  /admin/catalog/products:
    post:
      tags: [admin-catalog-products]
      security: [{ AdminBearer: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductCreate' }
      responses:
        '201':
          description: Draft product created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminProductDetail' }

  /admin/catalog/products/{productId}:
    get:
      tags: [admin-catalog-products]
      security: [{ AdminBearer: [] }]
      parameters: [ { $ref: '#/components/parameters/ProductId' } ]
      responses:
        '200':
          description: Admin product detail (all states, both locales).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminProductDetail' }
    put:
      tags: [admin-catalog-products]
      security: [{ AdminBearer: [] }]
      parameters: [ { $ref: '#/components/parameters/ProductId' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductUpdate' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminProductDetail' }
        '409': { $ref: '#/components/responses/Conflict' }

  /admin/catalog/products/{productId}/publish:
    post:
      tags: [admin-catalog-products]
      security: [{ AdminBearer: [] }]
      parameters: [ { $ref: '#/components/parameters/ProductId' } ]
      responses:
        '200':
          description: Published. Rejected if FR-015 parity check fails.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminProductDetail' }

  /admin/catalog/products/{productId}/archive:
    post:
      tags: [admin-catalog-products]
      security: [{ AdminBearer: [] }]
      parameters: [ { $ref: '#/components/parameters/ProductId' } ]
      responses:
        '200':
          description: Archived.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminProductDetail' }

  /admin/catalog/products/{productId}/variants:
    post:
      tags: [admin-catalog-variants]
      security: [{ AdminBearer: [] }]
      parameters: [ { $ref: '#/components/parameters/ProductId' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VariantCreate' }
      responses:
        '201':
          description: Variant created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminVariant' }
        '409':
          description: SKU conflict with an existing non-archived variant.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /admin/catalog/products/{productId}/variants/{variantId}:
    put:
      tags: [admin-catalog-variants]
      security: [{ AdminBearer: [] }]
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/VariantId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VariantUpdate' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminVariant' }

  /admin/catalog/products/{productId}/media:
    post:
      tags: [admin-catalog-media]
      security: [{ AdminBearer: [] }]
      parameters: [ { $ref: '#/components/parameters/ProductId' } ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, altTextAr, altTextEn]
              properties:
                file: { type: string, format: binary }
                altTextAr: { type: string, maxLength: 256 }
                altTextEn: { type: string, maxLength: 256 }
                variantId: { type: string, format: uuid, nullable: true }
                isPrimary: { type: boolean, default: false }
      responses:
        '201':
          description: Media linked (after clean virus scan).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminMedia' }
        '413':
          description: Payload too large (> 8 MB) or unsupported MIME type.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /admin/catalog/products/{productId}/documents:
    post:
      tags: [admin-catalog-documents]
      security: [{ AdminBearer: [] }]
      parameters: [ { $ref: '#/components/parameters/ProductId' } ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [typeTag, titleAr, titleEn]
              properties:
                file:
                  type: string
                  format: binary
                  description: Required for all type tags except `external-video-link`.
                externalUrl:
                  type: string
                  format: uri
                  description: Required when typeTag = external-video-link.
                typeTag:
                  type: string
                  enum: [spec-sheet, instructions-for-use, certification, external-video-link]
                titleAr: { type: string, maxLength: 256 }
                titleEn: { type: string, maxLength: 256 }
      responses:
        '201':
          description: Document linked.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminDocument' }

  /admin/catalog/taxonomy:
    get:
      tags: [admin-catalog-taxonomy]
      security: [{ AdminBearer: [] }]
      summary: Read-only list of migration-seeded taxonomy keys (Clarification Q5).
      responses:
        '200':
          description: Taxonomy keys.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TaxonomyKey' }

components:
  securitySchemes:
    AdminBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Admin JWT (spec 004). Audience = `buidsass.admin`. Required claims include `catalog.*` permission.

  parameters:
    AcceptLanguage:
      in: header
      name: Accept-Language
      required: false
      schema: { type: string, enum: [ar, en], default: en }
    ProductId:
      in: path
      name: productId
      required: true
      schema: { type: string, format: uuid }
    CategoryId:
      in: path
      name: categoryId
      required: true
      schema: { type: string, format: uuid }
    VariantId:
      in: path
      name: variantId
      required: true
      schema: { type: string, format: uuid }

  responses:
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Conflict:
      description: Optimistic concurrency conflict or slug/SKU collision.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  schemas:
    ErrorEnvelope:
      type: object
      required: [code, message]
      properties:
        code: { type: string, example: catalog.variant.sku_conflict }
        message: { type: string }
        details: { type: object, additionalProperties: true }
        correlationId: { type: string }

    PriceToken:
      type: object
      required: [productId, variantId, marketCode]
      properties:
        productId: { type: string, format: uuid }
        variantId: { type: string, format: uuid }
        marketCode: { type: string, enum: [EG, KSA] }

    EligibilityDecision:
      type: object
      required: [productId, allowed]
      properties:
        productId: { type: string, format: uuid }
        allowed: { type: boolean }
        reasonCode:
          type: string
          nullable: true
          enum: [requires-auth, requires-verification, not-eligible-for-market, null]
        reasonCopy:
          type: string
          nullable: true
          description: Localized (Accept-Language of caller)

    CustomerCategoryListing:
      type: object
      required: [items, total]
      properties:
        total: { type: integer }
        items:
          type: array
          items: { $ref: '#/components/schemas/CustomerCategoryNode' }

    CustomerCategoryNode:
      type: object
      required: [id, name, slug, hasChildren]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        parentId: { type: string, format: uuid, nullable: true }
        position: { type: integer }
        hasChildren: { type: boolean }

    CustomerProductListing:
      type: object
      required: [items, total, page, pageSize]
      properties:
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }
        clampedPageSize: { type: boolean }
        items:
          type: array
          items: { $ref: '#/components/schemas/CustomerProductCard' }

    CustomerProductCard:
      type: object
      required: [id, name, primaryImage, priceToken, available, restricted]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        primaryImage: { $ref: '#/components/schemas/MediaRef' }
        priceToken: { $ref: '#/components/schemas/PriceToken' }
        available: { type: boolean }
        restricted: { type: boolean }
        restrictionReasonCode:
          type: string
          nullable: true
        restrictionRationale:
          type: string
          nullable: true

    CustomerProductDetail:
      allOf:
        - $ref: '#/components/schemas/CustomerProductCard'
        - type: object
          required: [marketingDescription, shortDescription, variants, media, documents]
          properties:
            marketingDescription: { type: string }
            shortDescription: { type: string }
            brand: { $ref: '#/components/schemas/BrandRef' }
            categories:
              type: array
              items: { $ref: '#/components/schemas/CategoryRef' }
            attributes:
              type: array
              items: { $ref: '#/components/schemas/AttributeView' }
            variants:
              type: array
              items: { $ref: '#/components/schemas/CustomerVariant' }
            media:
              type: array
              items: { $ref: '#/components/schemas/MediaRef' }
            documents:
              type: array
              items: { $ref: '#/components/schemas/DocumentRef' }
            fallbackLocales:
              type: array
              description: Field names whose copy fell back to the other locale.
              items: { type: string }

    CustomerVariant:
      type: object
      required: [id, sku, axes, priceToken, available]
      properties:
        id: { type: string, format: uuid }
        sku: { type: string }
        axes:
          type: array
          items: { $ref: '#/components/schemas/AttributeView' }
        priceToken: { $ref: '#/components/schemas/PriceToken' }
        available: { type: boolean }

    AttributeView:
      type: object
      required: [key, label, value]
      properties:
        key: { type: string }
        label: { type: string }
        unit: { type: string, nullable: true }
        value:
          description: Rendered value (string form); typed info in `valueType`.
          oneOf:
            - { type: string }
            - { type: number }
            - { type: boolean }
        valueType: { type: string, enum: [string, number, boolean, enum] }

    MediaRef:
      type: object
      required: [id, url, altText]
      properties:
        id: { type: string, format: uuid }
        url: { type: string, format: uri }
        altText: { type: string }
        isPrimary: { type: boolean, default: false }

    DocumentRef:
      type: object
      required: [id, typeTag, title]
      properties:
        id: { type: string, format: uuid }
        typeTag: { type: string }
        title: { type: string }
        url: { type: string, format: uri }

    BrandRef:
      type: object
      required: [id, name, slug]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        logo: { $ref: '#/components/schemas/MediaRef' }

    CategoryRef:
      type: object
      required: [id, name, slug]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }

    AdminCategory:
      type: object
      required: [id, nameAr, nameEn, slugAr, slugEn, active, depth, position, rowVersion]
      properties:
        id: { type: string, format: uuid }
        parentId: { type: string, format: uuid, nullable: true }
        nameAr: { type: string }
        nameEn: { type: string }
        slugAr: { type: string }
        slugEn: { type: string }
        active: { type: boolean }
        depth: { type: integer }
        position: { type: integer }
        path: { type: string }
        rowVersion: { type: string, description: Opaque base64 xmin }

    CategoryCreate:
      type: object
      required: [nameAr, nameEn, slugAr, slugEn]
      properties:
        parentId: { type: string, format: uuid, nullable: true }
        nameAr: { type: string }
        nameEn: { type: string }
        slugAr: { type: string }
        slugEn: { type: string }

    CategoryUpdate:
      allOf:
        - $ref: '#/components/schemas/CategoryCreate'
        - type: object
          required: [rowVersion, active]
          properties:
            active: { type: boolean }
            rowVersion: { type: string }

    AdminBrand:
      type: object
      required: [id, nameAr, nameEn, slug, active, rowVersion]
      properties:
        id: { type: string, format: uuid }
        nameAr: { type: string }
        nameEn: { type: string }
        slug: { type: string }
        descriptionAr: { type: string }
        descriptionEn: { type: string }
        originCountryCode: { type: string, nullable: true }
        logo: { $ref: '#/components/schemas/MediaRef' }
        active: { type: boolean }
        rowVersion: { type: string }

    BrandCreate:
      type: object
      required: [nameAr, nameEn, slug, descriptionAr, descriptionEn]
      properties:
        nameAr: { type: string }
        nameEn: { type: string }
        slug: { type: string }
        descriptionAr: { type: string }
        descriptionEn: { type: string }
        originCountryCode: { type: string, nullable: true }

    AdminProductDetail:
      type: object
      required: [id, nameAr, nameEn, publishStatus, active, restrictedForPurchase, rowVersion]
      properties:
        id: { type: string, format: uuid }
        brandId: { type: string, format: uuid }
        manufacturerId: { type: string, format: uuid, nullable: true }
        nameAr: { type: string }
        nameEn: { type: string }
        marketingDescriptionAr: { type: string }
        marketingDescriptionEn: { type: string }
        shortDescriptionAr: { type: string }
        shortDescriptionEn: { type: string }
        publishStatus: { type: string, enum: [draft, published, archived] }
        active: { type: boolean }
        restrictedForPurchase: { type: boolean }
        restrictionReasonCode: { type: string, nullable: true }
        restrictionRationaleAr: { type: string, nullable: true }
        restrictionRationaleEn: { type: string, nullable: true }
        categoryIds:
          type: array
          items: { type: string, format: uuid }
        attributes:
          type: array
          items: { $ref: '#/components/schemas/AttributePair' }
        variants:
          type: array
          items: { $ref: '#/components/schemas/AdminVariant' }
        media:
          type: array
          items: { $ref: '#/components/schemas/AdminMedia' }
        documents:
          type: array
          items: { $ref: '#/components/schemas/AdminDocument' }
        rowVersion: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ProductCreate:
      type: object
      required: [brandId, nameAr, nameEn, marketingDescriptionAr, marketingDescriptionEn, shortDescriptionAr, shortDescriptionEn]
      properties:
        brandId: { type: string, format: uuid }
        manufacturerId: { type: string, format: uuid, nullable: true }
        nameAr: { type: string }
        nameEn: { type: string }
        marketingDescriptionAr: { type: string }
        marketingDescriptionEn: { type: string }
        shortDescriptionAr: { type: string }
        shortDescriptionEn: { type: string }
        categoryIds:
          type: array
          items: { type: string, format: uuid }
        restrictedForPurchase: { type: boolean, default: false }
        restrictionReasonCode: { type: string, nullable: true }
        restrictionRationaleAr: { type: string, nullable: true }
        restrictionRationaleEn: { type: string, nullable: true }
        attributes:
          type: array
          items: { $ref: '#/components/schemas/AttributePair' }

    ProductUpdate:
      allOf:
        - $ref: '#/components/schemas/ProductCreate'
        - type: object
          required: [rowVersion]
          properties:
            rowVersion: { type: string }

    AttributePair:
      type: object
      required: [key, valueType]
      properties:
        key: { type: string }
        valueType: { type: string, enum: [string, number, boolean, enum] }
        valueText: { type: string, nullable: true }
        valueNum: { type: number, nullable: true }
        valueBool: { type: boolean, nullable: true }
        enumCode: { type: string, nullable: true }

    VariantCreate:
      type: object
      required: [sku, axes]
      properties:
        sku: { type: string, pattern: '^[A-Z0-9][A-Z0-9-]{2,31}$' }
        barcode: { type: string, nullable: true }
        axes:
          type: array
          items: { $ref: '#/components/schemas/AttributePair' }
        attributeOverlays:
          type: array
          items: { $ref: '#/components/schemas/AttributePair' }

    VariantUpdate:
      allOf:
        - $ref: '#/components/schemas/VariantCreate'
        - type: object
          required: [status, rowVersion]
          properties:
            status: { type: string, enum: [active, inactive, archived] }
            rowVersion: { type: string }

    AdminVariant:
      type: object
      required: [id, sku, status, position, rowVersion]
      properties:
        id: { type: string, format: uuid }
        productId: { type: string, format: uuid }
        sku: { type: string }
        barcode: { type: string, nullable: true }
        position: { type: integer }
        status: { type: string, enum: [active, inactive, archived] }
        axes:
          type: array
          items: { $ref: '#/components/schemas/AttributePair' }
        attributeOverlays:
          type: array
          items: { $ref: '#/components/schemas/AttributePair' }
        rowVersion: { type: string }

    AdminMedia:
      type: object
      required: [id, storageRef, mimeType, sizeBytes, position, altTextAr, altTextEn]
      properties:
        id: { type: string, format: uuid }
        productId: { type: string, format: uuid, nullable: true }
        variantId: { type: string, format: uuid, nullable: true }
        storageRef: { type: string }
        mimeType: { type: string }
        sizeBytes: { type: integer }
        position: { type: integer }
        isPrimary: { type: boolean }
        altTextAr: { type: string }
        altTextEn: { type: string }
        url: { type: string, format: uri, description: Signed read URL }

    AdminDocument:
      type: object
      required: [id, typeTag, titleAr, titleEn]
      properties:
        id: { type: string, format: uuid }
        productId: { type: string, format: uuid }
        typeTag: { type: string }
        titleAr: { type: string }
        titleEn: { type: string }
        storageRef: { type: string, nullable: true }
        externalUrl: { type: string, format: uri, nullable: true }
        mimeType: { type: string, nullable: true }
        sizeBytes: { type: integer, nullable: true }
        url: { type: string, format: uri, nullable: true }

    TaxonomyKey:
      type: object
      required: [key, valueType, displayLabelAr, displayLabelEn]
      properties:
        key: { type: string }
        valueType: { type: string, enum: [string, number, boolean, enum] }
        unit: { type: string, nullable: true }
        displayLabelAr: { type: string }
        displayLabelEn: { type: string }
        enumValues:
          type: array
          nullable: true
          items:
            type: object
            required: [code, labelAr, labelEn]
            properties:
              code: { type: string }
              labelAr: { type: string }
              labelEn: { type: string }
        isVariantAxis: { type: boolean }

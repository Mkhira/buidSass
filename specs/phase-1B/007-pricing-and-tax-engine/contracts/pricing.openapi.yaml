openapi: 3.1.0
info:
  title: Dental Commerce Platform — Pricing & Tax Engine (spec 007-a)
  version: 0.1.0
  description: |
    Deterministic pricing pipeline + VAT computation + promotion primitives + coupon validation.
    Engine-only surface; authoring UX lives in spec 007-b.
servers:
  - url: https://api.buidsass.com
  - url: http://localhost:5080

tags:
  - name: pricing-customer
  - name: pricing-admin

paths:
  /pricing/resolve-basket:
    post:
      tags: [pricing-customer]
      operationId: resolveBasket
      summary: Resolve basket pricing with full breakdown
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResolveBasketRequest' }
      responses:
        '200':
          description: Breakdown returned
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BasketPricingBreakdown' }
        '400':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/Error'

  /pricing/resolve-token:
    post:
      tags: [pricing-customer]
      operationId: resolveToken
      summary: Resolve single-variant price from search-issued priceToken
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResolveTokenRequest' }
      responses:
        '200':
          description: Line breakdown
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LinePricingBreakdown' }
        '400':
          $ref: '#/components/responses/Error'
        '410':
          description: Token expired
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /pricing/validate-coupon:
    post:
      tags: [pricing-customer]
      operationId: validateCoupon
      summary: Dry-run coupon validation against a basket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ResolveBasketRequest'
                - type: object
                  required: [couponCode]
                  properties:
                    couponCode: { type: string }
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
                  discountMinor: { type: integer, format: int64, nullable: true }
                  errors:
                    type: array
                    items: { $ref: '#/components/schemas/CouponValidationError' }

  /pricing/coupons/{couponId}/commit-redemption:
    post:
      tags: [pricing-customer]
      operationId: commitRedemption
      summary: Idempotent redemption commit (called by checkout spec 010)
      security:
        - bearerAuth: [checkout.commit]
      parameters:
        - name: couponId
          in: path
          required: true
          schema: { type: string, format: ulid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [basketId, customerId, discountMinor]
              properties:
                basketId: { type: string, format: ulid }
                customerId: { type: string, format: ulid }
                discountMinor: { type: integer, format: int64 }
      responses:
        '201':
          description: Redemption recorded (or already existed — idempotent)
        '409':
          $ref: '#/components/responses/Error'

  /admin/pricing/promotions:
    get:
      tags: [pricing-admin]
      security: [{ bearerAuth: [pricing.read] }]
      operationId: adminListPromotions
      parameters:
        - { name: market, in: query, required: true, schema: { type: string, enum: [eg, ksa] } }
        - { name: state, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: pageSize, in: query, schema: { type: integer, default: 50, maximum: 200 } }
      responses:
        '200':
          description: Promotion list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/PromotionRule' }
                  total: { type: integer }
    post:
      tags: [pricing-admin]
      security: [{ bearerAuth: [pricing.write.promo] }]
      operationId: adminCreatePromotion
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PromotionRuleInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PromotionRule' }

  /admin/pricing/promotions/{id}:
    put:
      tags: [pricing-admin]
      security: [{ bearerAuth: [pricing.write.promo] }]
      operationId: adminUpdatePromotion
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: ulid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PromotionRuleInput' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PromotionRule' }
        '409':
          $ref: '#/components/responses/Error'
    delete:
      tags: [pricing-admin]
      security: [{ bearerAuth: [pricing.write.promo] }]
      operationId: adminDeletePromotion
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: ulid } }
      responses:
        '204':
          description: Soft-deleted

  /admin/pricing/coupons:
    get:
      tags: [pricing-admin]
      security: [{ bearerAuth: [pricing.read] }]
      operationId: adminListCoupons
      parameters:
        - { name: market, in: query, required: true, schema: { type: string, enum: [eg, ksa] } }
      responses:
        '200':
          description: Coupon list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Coupon' }
    post:
      tags: [pricing-admin]
      security: [{ bearerAuth: [pricing.write.coupon] }]
      operationId: adminCreateCoupon
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CouponInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Coupon' }

  /admin/pricing/coupons/{id}:
    put:
      tags: [pricing-admin]
      security: [{ bearerAuth: [pricing.write.coupon] }]
      operationId: adminUpdateCoupon
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: ulid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CouponInput' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Coupon' }

  /admin/pricing/business/{companyId}/{variantId}:
    get:
      tags: [pricing-admin]
      security: [{ bearerAuth: [pricing.read] }]
      operationId: adminGetBusinessPricing
      parameters:
        - { name: companyId, in: path, required: true, schema: { type: string, format: ulid } }
        - { name: variantId, in: path, required: true, schema: { type: string, format: ulid } }
      responses:
        '200':
          description: Business pricing entry
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BusinessPricingEntry' }
        '404':
          $ref: '#/components/responses/Error'
    put:
      tags: [pricing-admin]
      security: [{ bearerAuth: [pricing.write.business] }]
      operationId: adminUpsertBusinessPricing
      parameters:
        - { name: companyId, in: path, required: true, schema: { type: string, format: ulid } }
        - { name: variantId, in: path, required: true, schema: { type: string, format: ulid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [priceMinorUnits, currencyCode]
              properties:
                priceMinorUnits: { type: integer, format: int64 }
                currencyCode: { type: string, enum: [SAR, EGP] }
                activeFrom: { type: string, format: date-time }
                activeTo: { type: string, format: date-time, nullable: true }
      responses:
        '200':
          description: Upserted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BusinessPricingEntry' }

  /admin/pricing/tier/{variantId}:
    get:
      tags: [pricing-admin]
      security: [{ bearerAuth: [pricing.read] }]
      operationId: adminListTierPricing
      parameters:
        - { name: variantId, in: path, required: true, schema: { type: string, format: ulid } }
      responses:
        '200':
          description: Tier entries
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TierPricingEntry' }
    put:
      tags: [pricing-admin]
      security: [{ bearerAuth: [pricing.write.promo] }]
      operationId: adminReplaceTierPricing
      parameters:
        - { name: variantId, in: path, required: true, schema: { type: string, format: ulid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '#/components/schemas/TierPricingInput' }
      responses:
        '200':
          description: Replaced
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TierPricingEntry' }

  /admin/pricing/tax/{marketCode}:
    get:
      tags: [pricing-admin]
      security: [{ bearerAuth: [pricing.read] }]
      operationId: adminGetTaxRules
      parameters:
        - { name: marketCode, in: path, required: true, schema: { type: string, enum: [eg, ksa] } }
      responses:
        '200':
          description: Active tax rules for market
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TaxRule' }
    put:
      tags: [pricing-admin]
      security: [{ bearerAuth: [pricing.write.tax] }]
      operationId: adminUpdateTaxRule
      parameters:
        - { name: marketCode, in: path, required: true, schema: { type: string, enum: [eg, ksa] } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [taxClass, rateBasisPoints, displayMode, activeFrom]
              properties:
                taxClass: { type: string }
                rateBasisPoints: { type: integer, minimum: 0, maximum: 10000 }
                displayMode: { type: string, enum: [inclusive, exclusive] }
                activeFrom: { type: string, format: date-time }
                activeTo: { type: string, format: date-time, nullable: true }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TaxRule' }

  /admin/pricing/resolve-debug:
    post:
      tags: [pricing-admin]
      security: [{ bearerAuth: [pricing.audit] }]
      operationId: adminResolveDebug
      summary: Historical replay of pipeline against authored data at a past instant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ResolveBasketRequest'
                - type: object
                  required: [at]
                  properties:
                    at: { type: string, format: date-time }
      responses:
        '200':
          description: Historical breakdown
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BasketPricingBreakdown' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Error:
      description: Error envelope
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  schemas:
    ResolveBasketRequest:
      type: object
      required: [basketId, marketCode, lines]
      properties:
        basketId: { type: string, format: ulid }
        customerId: { type: string, format: ulid, nullable: true }
        companyId: { type: string, format: ulid, nullable: true }
        marketCode: { type: string, enum: [eg, ksa] }
        lines:
          type: array
          minItems: 1
          maxItems: 200
          items:
            type: object
            required: [variantId, quantity]
            properties:
              variantId: { type: string, format: ulid }
              quantity: { type: integer, minimum: 1 }
        couponCode: { type: string, nullable: true }

    ResolveTokenRequest:
      type: object
      required: [priceToken, marketCode]
      properties:
        priceToken: { type: string }
        customerId: { type: string, format: ulid, nullable: true }
        marketCode: { type: string, enum: [eg, ksa] }

    LinePricingBreakdown:
      type: object
      required: [variantId, quantity, basePriceMinor, resolvedUnitPriceMinor, lineSubtotalMinor, lineNetMinor, taxMinor, lineTotalMinor, trace]
      properties:
        variantId: { type: string, format: ulid }
        quantity: { type: integer }
        basePriceMinor: { type: integer, format: int64 }
        compareAtMinor: { type: integer, format: int64, nullable: true }
        resolvedUnitPriceMinor: { type: integer, format: int64 }
        lineSubtotalMinor: { type: integer, format: int64 }
        discountsApplied:
          type: array
          items:
            type: object
            properties:
              source: { type: string, enum: [promo, coupon] }
              id: { type: string, format: ulid }
              amountMinor: { type: integer, format: int64 }
              note: { type: string }
        lineNetMinor: { type: integer, format: int64 }
        taxMinor: { type: integer, format: int64 }
        lineTotalMinor: { type: integer, format: int64 }
        trace:
          type: array
          items: { $ref: '#/components/schemas/BreakdownTraceEntry' }

    BasketPricingBreakdown:
      type: object
      required: [breakdownCorrelationId, marketCode, currency, lines, subtotalMinor, discountsTotalMinor, netTotalMinor, taxTotalMinor, totalMinor]
      properties:
        breakdownCorrelationId: { type: string, format: ulid }
        marketCode: { type: string, enum: [eg, ksa] }
        currency: { type: string, enum: [SAR, EGP] }
        lines:
          type: array
          items: { $ref: '#/components/schemas/LinePricingBreakdown' }
        couponApplied:
          nullable: true
          type: object
          properties:
            couponId: { type: string, format: ulid }
            code: { type: string }
            discountMinor: { type: integer, format: int64 }
        couponValidationErrors:
          type: array
          items: { $ref: '#/components/schemas/CouponValidationError' }
        subtotalMinor: { type: integer, format: int64 }
        discountsTotalMinor: { type: integer, format: int64 }
        netTotalMinor: { type: integer, format: int64 }
        taxTotalMinor: { type: integer, format: int64 }
        totalMinor: { type: integer, format: int64 }
        warnings:
          type: array
          items: { type: string }

    BreakdownTraceEntry:
      type: object
      properties:
        stage: { type: string, enum: [base, compare_at, business, tier, promo, coupon, net, tax, total] }
        promotionId: { type: string, format: ulid, nullable: true }
        couponId: { type: string, format: ulid, nullable: true }
        priceBeforeMinor: { type: integer, format: int64, nullable: true }
        priceAfterMinor: { type: integer, format: int64, nullable: true }
        note: { type: string }

    CouponValidationError:
      type: object
      required: [code, messageEn, messageAr]
      properties:
        code:
          type: string
          enum:
            - pricing.coupon_not_found
            - pricing.coupon_inactive
            - pricing.coupon_expired
            - pricing.coupon_exhausted_global
            - pricing.coupon_exhausted_for_customer
            - pricing.coupon_min_basket_not_met
            - pricing.coupon_segment_ineligible
            - pricing.coupon_no_eligible_lines
            - pricing.coupon_blocked_by_exclusion_flag
        messageEn: { type: string }
        messageAr: { type: string }

    PromotionRule:
      allOf:
        - $ref: '#/components/schemas/PromotionRuleInput'
        - type: object
          required: [id, state, createdAt, updatedAt]
          properties:
            id: { type: string, format: ulid }
            state: { type: string, enum: [draft, scheduled, active, paused, expired] }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }

    PromotionRuleInput:
      type: object
      required: [type, priority, markets, titleEn, titleAr, eligibilityPredicate]
      properties:
        type: { type: string, enum: [percentage, fixed, bogo, bundle] }
        priority: { type: integer, minimum: 0, maximum: 999 }
        stackable: { type: boolean }
        exclusionFlag: { type: boolean }
        activeFrom: { type: string, format: date-time }
        activeTo: { type: string, format: date-time, nullable: true }
        markets:
          type: array
          items: { type: string, enum: [eg, ksa] }
        valueBasisPoints: { type: integer, nullable: true }
        valueMinorUnits: { type: integer, format: int64, nullable: true }
        rulePayload: { type: object, additionalProperties: true, nullable: true }
        eligibilityPredicate: { type: object, additionalProperties: true }
        usageCapGlobal: { type: integer, format: int64, nullable: true }
        usageCapPerCustomer: { type: integer, nullable: true }
        titleEn: { type: string }
        titleAr: { type: string }

    Coupon:
      allOf:
        - $ref: '#/components/schemas/CouponInput'
        - type: object
          required: [id, state]
          properties:
            id: { type: string, format: ulid }
            state: { type: string, enum: [draft, scheduled, active, paused, expired, exhausted] }

    CouponInput:
      type: object
      required: [code, marketCode, promotionRuleId]
      properties:
        code: { type: string }
        marketCode: { type: string, enum: [eg, ksa] }
        promotionRuleId: { type: string, format: ulid }
        usageCapTotal: { type: integer, format: int64, nullable: true }
        usageCapPerCustomer: { type: integer, nullable: true }
        minBasketAmountMinor: { type: integer, format: int64, nullable: true }
        eligibleCustomerSegments:
          type: array
          items: { type: string }
        singleUsePerCustomer: { type: boolean }
        activeFrom: { type: string, format: date-time }
        activeTo: { type: string, format: date-time, nullable: true }

    BusinessPricingEntry:
      type: object
      required: [id, companyId, priceMinorUnits, currencyCode]
      properties:
        id: { type: string, format: ulid }
        companyId: { type: string, format: ulid }
        variantId: { type: string, format: ulid, nullable: true }
        categoryId: { type: string, format: ulid, nullable: true }
        priceMinorUnits: { type: integer, format: int64 }
        currencyCode: { type: string, enum: [SAR, EGP] }
        activeFrom: { type: string, format: date-time }
        activeTo: { type: string, format: date-time, nullable: true }

    TierPricingEntry:
      allOf:
        - $ref: '#/components/schemas/TierPricingInput'
        - type: object
          required: [id]
          properties:
            id: { type: string, format: ulid }

    TierPricingInput:
      type: object
      required: [minQuantity, priceMinorUnits, marketCode]
      properties:
        variantId: { type: string, format: ulid, nullable: true }
        categoryId: { type: string, format: ulid, nullable: true }
        minQuantity: { type: integer, minimum: 1 }
        priceMinorUnits: { type: integer, format: int64 }
        marketCode: { type: string, enum: [eg, ksa] }
        activeFrom: { type: string, format: date-time }
        activeTo: { type: string, format: date-time, nullable: true }

    TaxRule:
      type: object
      required: [id, marketCode, taxClass, rateBasisPoints, displayMode, activeFrom]
      properties:
        id: { type: string, format: ulid }
        marketCode: { type: string, enum: [eg, ksa] }
        taxClass: { type: string }
        rateBasisPoints: { type: integer }
        displayMode: { type: string, enum: [inclusive, exclusive] }
        activeFrom: { type: string, format: date-time }
        activeTo: { type: string, format: date-time, nullable: true }

    ErrorEnvelope:
      type: object
      required: [code, messageEn, messageAr, correlationId]
      properties:
        code:
          type: string
          enum:
            - pricing.basket_too_large
            - pricing.currency_mismatch
            - pricing.token_expired
            - pricing.token_invalid
            - pricing.tax_rule_missing
            - pricing.rate_limited
            - pricing.concurrent_write_conflict
            - pricing.forbidden
            - pricing.validation_failed
            - pricing.not_found
        messageEn: { type: string }
        messageAr: { type: string }
        correlationId: { type: string, format: ulid }
        details:
          type: object
          additionalProperties: true

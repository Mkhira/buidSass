openapi: 3.1.0
info:
  title: Inventory API (Phase 1B — Spec 008)
  version: 0.1.0
  description: |
    Customer and admin inventory endpoints for the dental commerce platform.
    All responses bilingual via `Accept-Language` (ar | en). Money absent (valuation
    out of scope). Monetary types appear only in error envelopes when proxying from
    other modules. Errors conform to the shared `ErrorEnvelope` shape with
    `inventory.*` codes.
servers:
  - url: https://api.dental.example.com
    description: Production
  - url: https://api.dental.staging.example.com
    description: Staging

tags:
  - name: Availability
  - name: Reservations
  - name: Returns
  - name: Admin - Stock
  - name: Admin - Ledger
  - name: Admin - Batches
  - name: Admin - Transfers
  - name: Admin - Thresholds
  - name: Admin - Warehouses
  - name: Admin - Dashboards

paths:
  # -------- Customer / storefront --------
  /inventory/availability:
    get:
      tags: [Availability]
      summary: Batch availability lookup (public)
      parameters:
        - in: query
          name: marketCode
          required: true
          schema: { type: string, enum: [eg, ksa] }
        - in: query
          name: variantIds
          required: true
          description: Comma-separated ULIDs (max 50)
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/AvailabilityItem' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /inventory/basket/validate:
    post:
      tags: [Availability]
      summary: Revalidate basket line feasibility (checkout precondition)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BasketValidateRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BasketValidateResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /inventory/reservations:
    post:
      tags: [Reservations]
      summary: Create a soft-held reservation for a basket
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReservationCreateRequest' }
      responses:
        '201':
          description: Reservation created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reservation' }
        '409':
          description: insufficient_stock | concurrent_write_conflict | restricted_not_eligible
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /inventory/reservations/{id}:
    get:
      tags: [Reservations]
      summary: Fetch reservation state
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reservation' }
        '404': { $ref: '#/components/responses/NotFound' }

  /inventory/reservations/{id}/extend:
    post:
      tags: [Reservations]
      summary: Extend TTL (max once per reservation)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: Extended
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reservation' }
        '409':
          description: already_extended | invalid_state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /inventory/reservations/{id}/commit:
    post:
      tags: [Reservations]
      summary: Convert soft-held → committed at order placement (FEFO picks resolved)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId]
              properties:
                orderId: { type: string }
      responses:
        '200':
          description: Committed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CommitResponse' }
        '409':
          description: invalid_state | insufficient_stock_at_commit
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /inventory/reservations/{id}/fulfil:
    post:
      tags: [Reservations]
      summary: Mark reservation fulfilled after shipment dispatch (writes movements)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: Fulfilled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reservation' }

  /inventory/reservations/{id}/release:
    post:
      tags: [Reservations]
      summary: Release reservation (customer abandonment / order cancellation)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: Released
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reservation' }

  /inventory/returns/restock:
    post:
      tags: [Returns]
      summary: Post return-restock movements (called by returns module)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReturnRestockRequest' }
      responses:
        '200':
          description: Posted
          content:
            application/json:
              schema:
                type: object
                properties:
                  movementIds: { type: array, items: { type: string } }

  # -------- Admin --------
  /admin/inventory/stock:
    get:
      tags: [Admin - Stock]
      summary: Per-(variant, warehouse) stock snapshot with filters
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: warehouseId, schema: { type: string } }
        - { in: query, name: variantId, schema: { type: string } }
        - { in: query, name: lowStockOnly, schema: { type: boolean } }
        - { in: query, name: cursor, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/StockRow' }
                  nextCursor: { type: string, nullable: true }

  /admin/inventory/ledger:
    get:
      tags: [Admin - Ledger]
      summary: Query or export movement ledger
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: variantId, schema: { type: string } }
        - { in: query, name: warehouseId, schema: { type: string } }
        - { in: query, name: from, schema: { type: string, format: date-time } }
        - { in: query, name: to, schema: { type: string, format: date-time } }
        - { in: query, name: movementType, schema: { type: string } }
        - { in: query, name: format, schema: { type: string, enum: [json, csv], default: json } }
        - { in: query, name: cursor, schema: { type: string } }
      responses:
        '200':
          description: OK (json) or CSV stream
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/StockMovementDTO' }
                  nextCursor: { type: string, nullable: true }
            text/csv:
              schema: { type: string, format: binary }

  /admin/inventory/adjustments:
    post:
      tags: [Admin - Stock]
      summary: Post an admin adjustment (requires reason code + optional evidence)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdjustmentRequest' }
      responses:
        '201':
          description: Adjustment posted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StockMovementDTO' }
        '400':
          description: invalid_reason_code | evidence_required | quantity_cap_exceeded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /admin/inventory/transfers:
    post:
      tags: [Admin - Transfers]
      summary: Intra-market transfer (paired out/in movements)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TransferRequest' }
      responses:
        '201':
          description: Transfer posted
          content:
            application/json:
              schema:
                type: object
                properties:
                  transferId: { type: string }
                  movementIds: { type: array, items: { type: string } }
        '409':
          description: cross_market_transfer_unsupported | insufficient_stock
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /admin/inventory/batches:
    post:
      tags: [Admin - Batches]
      summary: Receive a batch / lot (initial_receipt movement)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BatchInput' }
      responses:
        '201':
          description: Batch created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BatchDTO' }

  /admin/inventory/batches/{id}:
    patch:
      tags: [Admin - Batches]
      summary: Update batch attributes (expiry correction, supplier fix)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                expiryAt: { type: string, format: date }
                manufacturedAt: { type: string, format: date }
                manufacturerBatchCode: { type: string }
                supplierId: { type: string }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BatchDTO' }

  /admin/inventory/thresholds:
    put:
      tags: [Admin - Thresholds]
      summary: Set low-stock threshold for a variant (proxied to catalog)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [variantId, lowStockThreshold]
              properties:
                variantId: { type: string }
                lowStockThreshold: { type: integer, minimum: 0 }
      responses:
        '204': { description: Updated }

  /admin/inventory/reservations:
    get:
      tags: [Admin - Dashboards]
      summary: Active reservations dashboard feed
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: state, schema: { type: string, enum: [soft_held, committed, fulfilled, released, expired] } }
        - { in: query, name: marketCode, schema: { type: string, enum: [eg, ksa] } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Reservation' }

  /admin/inventory/reservations/{id}/force-release:
    post:
      tags: [Admin - Dashboards]
      summary: Force-release a reservation (requires inventory.reserve.manage)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reasonCode, notes]
              properties:
                reasonCode: { type: string }
                notes: { type: string }
      responses:
        '200':
          description: Released
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reservation' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/inventory/warehouses:
    get:
      tags: [Admin - Warehouses]
      summary: List configured warehouses
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Warehouse' }

  /admin/inventory/dashboards/low-stock:
    get:
      tags: [Admin - Dashboards]
      summary: Low-stock + out-of-stock variants (paginated)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: marketCode, schema: { type: string, enum: [eg, ksa] } }
        - { in: query, name: cursor, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/LowStockRow' }
                  nextCursor: { type: string, nullable: true }

  /admin/inventory/dashboards/expiring:
    get:
      tags: [Admin - Dashboards]
      summary: Batches expiring within N days (default 30)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: withinDays, schema: { type: integer, default: 30 } }
        - { in: query, name: marketCode, schema: { type: string, enum: [eg, ksa] } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/BatchDTO' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  schemas:
    AvailabilityItem:
      type: object
      required: [variantId, marketCode, ats, availabilityState]
      properties:
        variantId: { type: string }
        marketCode: { type: string, enum: [eg, ksa] }
        onHand: { type: integer, description: Admin-only; omitted for public callers }
        ats: { type: integer }
        availabilityState: { type: string, enum: [in_stock, low_stock, out_of_stock, preorder] }
        lowStockThreshold: { type: integer, description: Admin-only }

    BasketValidateRequest:
      type: object
      required: [marketCode, lines]
      properties:
        marketCode: { type: string, enum: [eg, ksa] }
        lines:
          type: array
          items:
            type: object
            required: [variantId, quantity]
            properties:
              variantId: { type: string }
              quantity: { type: integer, minimum: 1 }

    BasketValidateResponse:
      type: object
      properties:
        lines:
          type: array
          items:
            type: object
            properties:
              variantId: { type: string }
              requested: { type: integer }
              available: { type: integer }
              state: { type: string, enum: [in_stock, low_stock, out_of_stock, preorder] }
              ok: { type: boolean }

    ReservationCreateRequest:
      type: object
      required: [basketId, marketCode, lines]
      properties:
        basketId: { type: string }
        marketCode: { type: string, enum: [eg, ksa] }
        ttlSeconds: { type: integer, minimum: 60, maximum: 3600, default: 900 }
        customerId: { type: string }
        lines:
          type: array
          items:
            type: object
            required: [variantId, quantity]
            properties:
              variantId: { type: string }
              warehouseId: { type: string, nullable: true }
              quantity: { type: integer, minimum: 1 }

    Reservation:
      type: object
      properties:
        id: { type: string }
        basketId: { type: string }
        orderId: { type: string, nullable: true }
        state: { type: string, enum: [soft_held, committed, fulfilled, released, expired] }
        ttlSeconds: { type: integer }
        expiresAt: { type: string, format: date-time }
        extendedCount: { type: integer }
        correlationId: { type: string }
        lines:
          type: array
          items: { $ref: '#/components/schemas/ReservationLine' }
        committedAt: { type: string, format: date-time, nullable: true }
        fulfilledAt: { type: string, format: date-time, nullable: true }
        releasedAt: { type: string, format: date-time, nullable: true }
        expiredAt: { type: string, format: date-time, nullable: true }

    ReservationLine:
      type: object
      properties:
        variantId: { type: string }
        warehouseId: { type: string }
        quantity: { type: integer }
        pickedBatches:
          type: array
          items:
            type: object
            properties:
              batchId: { type: string }
              lotNumber: { type: string }
              quantity: { type: integer }

    CommitResponse:
      type: object
      properties:
        reservationId: { type: string }
        pickingGuidance:
          type: array
          items:
            type: object
            properties:
              variantId: { type: string }
              picks:
                type: array
                items:
                  type: object
                  properties:
                    batchId: { type: string }
                    lotNumber: { type: string }
                    quantity: { type: integer }
        warnings:
          type: array
          items: { type: string }

    StockRow:
      type: object
      properties:
        variantId: { type: string }
        warehouseId: { type: string }
        onHand: { type: integer }
        reserved: { type: integer }
        ats: { type: integer }
        lastMovementAt: { type: string, format: date-time, nullable: true }
        lowStockThreshold: { type: integer, nullable: true }
        availabilityState: { type: string, enum: [in_stock, low_stock, out_of_stock, preorder] }

    StockMovementDTO:
      type: object
      properties:
        id: { type: string }
        variantId: { type: string }
        warehouseId: { type: string }
        batchId: { type: string, nullable: true }
        quantityDelta: { type: integer }
        movementType: { type: string }
        reasonCode: { type: string, nullable: true }
        referenceType: { type: string, nullable: true }
        referenceId: { type: string, nullable: true }
        correlationId: { type: string }
        actorId: { type: string }
        recordedAt: { type: string, format: date-time }
        sequenceNumber: { type: integer }
        notes: { type: string, nullable: true }

    AdjustmentRequest:
      type: object
      required: [warehouseId, variantId, quantityDelta, reasonCode]
      properties:
        warehouseId: { type: string }
        variantId: { type: string }
        batchId: { type: string, nullable: true }
        quantityDelta: { type: integer, description: Signed; non-zero; |delta| ≤ 100000 }
        reasonCode: { type: string }
        evidenceRef: { type: string, nullable: true }
        notes: { type: string, nullable: true }

    TransferRequest:
      type: object
      required: [marketCode, sourceWarehouseId, destWarehouseId, lines, reasonCode]
      properties:
        marketCode: { type: string, enum: [eg, ksa] }
        sourceWarehouseId: { type: string }
        destWarehouseId: { type: string }
        reasonCode: { type: string }
        reference: { type: string, nullable: true }
        lines:
          type: array
          items:
            type: object
            required: [variantId, quantity]
            properties:
              variantId: { type: string }
              batchId: { type: string, nullable: true }
              quantity: { type: integer, minimum: 1 }

    ReturnRestockRequest:
      type: object
      required: [orderId, marketCode, lines]
      properties:
        orderId: { type: string }
        marketCode: { type: string, enum: [eg, ksa] }
        lines:
          type: array
          items:
            type: object
            required: [variantId, warehouseId, quantity, reason]
            properties:
              variantId: { type: string }
              warehouseId: { type: string }
              batchId: { type: string, nullable: true }
              quantity: { type: integer, minimum: 1 }
              reason: { type: string }

    BatchDTO:
      type: object
      properties:
        id: { type: string }
        variantId: { type: string }
        warehouseId: { type: string }
        lotNumber: { type: string }
        manufacturerBatchCode: { type: string, nullable: true }
        manufacturedAt: { type: string, format: date, nullable: true }
        expiryAt: { type: string, format: date, nullable: true }
        receivedQty: { type: integer }
        receivedAt: { type: string, format: date-time }
        supplierId: { type: string, nullable: true }
        state: { type: string, enum: [active, exhausted, expired] }

    BatchInput:
      type: object
      required: [variantId, warehouseId, lotNumber, receivedQty]
      properties:
        variantId: { type: string }
        warehouseId: { type: string }
        lotNumber: { type: string }
        manufacturerBatchCode: { type: string }
        manufacturedAt: { type: string, format: date }
        expiryAt: { type: string, format: date }
        receivedQty: { type: integer, minimum: 1 }
        supplierId: { type: string }
        notes: { type: string }

    Warehouse:
      type: object
      properties:
        id: { type: string }
        code: { type: string }
        nameEn: { type: string }
        nameAr: { type: string }
        marketCode: { type: string, enum: [eg, ksa] }
        isDefaultForMarket: { type: boolean }
        active: { type: boolean }
        timeZone: { type: string }

    LowStockRow:
      type: object
      properties:
        variantId: { type: string }
        warehouseId: { type: string }
        ats: { type: integer }
        lowStockThreshold: { type: integer }
        state: { type: string, enum: [low_stock, out_of_stock] }
        lastEmittedAt: { type: string, format: date-time, nullable: true }

    ErrorEnvelope:
      type: object
      properties:
        code: { type: string, example: inventory.insufficient_stock }
        message: { type: string }
        correlationId: { type: string }
        details:
          type: object
          additionalProperties: true
